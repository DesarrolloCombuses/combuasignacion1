<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuera de servicio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .contenedor {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 50px 35px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .icono {
      font-size: 70px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
      color: #facc15;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #e2e8f0;
      margin-bottom: 15px;
    }

    .subtexto {
      font-size: 15px;
      color: #cbd5e1;
      margin-top: 10px;
    }

    .boton {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 28px;
      background: #facc15;
      color: #0f172a;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: 0.3s ease;
    }

    .boton:hover {
      background: #eab308;
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 30px;
      }

      p {
        font-size: 16px;
      }

      .contenedor {
        padding: 35px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="icono">⚠️</div>
    <h1>Fuera de Servicio</h1>
    <p>
      En este momento la plataforma no se encuentra disponible.
    </p>
    <p>
      Estamos realizando labores de mantenimiento o actualización.
      Por favor, inténtelo nuevamente más tarde.
    </p>
    <p class="subtexto">
      Gracias por su comprensión.
    </p>

    <a href="javascript:location.reload()" class="boton">Reintentar</a>
  </div>
</body>
</html>
